{% extends 'quizapp/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Step {{ progress }}: Create Account</h2>
        <p class="lead">Almost done! Provide login details:</p>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success btn-lg">Create & Login</button>
        </form>
        <div class="progress mt-4">
            <div class="progress-bar bg-success" style="width: 100%"></div>
        </div>
        <p class="mt-3 small">
            Profile: Age {{ quiz_data.age }}, Gender {{ quiz_data.gender }}, Prefs: {{ quiz_data.preferences }}
        </p>
    </div>
</div>
{% endblock %}
