{% extends 'accounts/base.html' %}

{% block title %}Password Reset Complete - SoulMate{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card p-4 text-center">
            <div class="mb-4">
                <div class="rounded-circle bg-success d-inline-flex align-items-center justify-content-center" 
                     style="width: 80px; height: 80px; margin-bottom: 1rem;">
                    <i class="fas fa-check fa-2x text-white"></i>
                </div>
                <h2 class="logo mb-2">Password Reset Complete</h2>
                <p class="text-muted">
                    Your password has been set. You may go ahead and sign in now.
                </p>
            </div>
            
            <div class="d-grid gap-2">
                <a href="{% url 'accounts:login' %}" class="btn btn-primary btn-lg">
                    <i class="fas fa-sign-in-alt me-2"></i> Sign In Now
                </a>
                
                <a href="{% url 'accounts:home' %}" class="btn btn-outline-light">
                    <i class="fas fa-home me-1"></i> Return to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
