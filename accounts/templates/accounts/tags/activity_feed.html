{% load account_tags %}
<div class="activity-feed">
    <h6 class="mb-3 border-bottom pb-2">Recent Activity</h6>
    <div class="list-group list-group-flush">
        {% for activity in activities %}
            <div class="list-group-item bg-transparent border-secondary">
                <div class="d-flex w-100 justify-content-between">
                    <small class="text-muted">
                        <i class="fas fa-circle fa-xs text-primary me-2"></i>
                        {{ activity.activity_type|format_activity_type }}
                    </small>
                    <small>{{ activity.created_at|timesince }} ago</small>
                </div>
                {% if activity.additional_info %}
                    <p class="mb-1 small text-muted mt-1">{{ activity.additional_info }}</p>
                {% endif %}
            </div>
        {% empty %}
            <div class="list-group-item bg-transparent border-secondary text-center text-muted py-3">
                <i class="fas fa-inbox fa-2x mb-2"></i>
                <p class="mb-0">No recent activity</p>
            </div>
        {% endfor %}
    </div>
</div>
